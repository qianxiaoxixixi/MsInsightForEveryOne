seed: 42
output_dir: "./output"

training:
  epochs: 10
  max_steps: 10
  batch_size: 1
  save_ckpt: False
  save_checkpoint_steps: 5

train_dataset:
  dataset_dir: "/data00/dynamic-parallel/mindformers/experimental/pangu_demo/dataset"
  shuffle: False
  drop_remainder: True
  eod_id: 50256

optimizer:
  type: "SGD"
  learning_rate: 1.e-3

parallel_config:
  tensor_parallel: 1
  pipeline_stage: 4
  context_parallel: 1
  expert_parallel: 1
  micro_batch_num: 4
  use_sequence_parallel: False
  recv_dtype: "float32"
  reduction: "mean"
  use_zero3: False

model_config:
  seq_length: 1024
  vocab_size: 50257
  num_layers: 4  # ori 16
  num_heads: 8   # ori 32
  hidden_size: 2560
  ffn_hidden_size: 10240
  attn_type: "self_attn"
  mlp_has_gate: False
  use_gqa: False
  qkv_has_bias: False
  out_proj_has_bias: False
  apply_query_key_layer_scaling: False
  mask_func_type: "attn_mask_add"
  mlp_has_bias: False
  hidden_act: "gelu"
  normalization: "LayerNorm"
  layernorm_epsilon: 1.e-8
  apply_residual_connection_post_norm: True
  residual_connection_dtype: "float16"
  param_init_dtype: "float16"
  compute_dtype: "float16"
  softmax_compute_dtype: "float16"
  dropout_rate: 0.0
  hidden_dropout_rate: 0.0
  attention_dropout_rate: 0.0
  num_experts: null
  share_embedding_weight: True

