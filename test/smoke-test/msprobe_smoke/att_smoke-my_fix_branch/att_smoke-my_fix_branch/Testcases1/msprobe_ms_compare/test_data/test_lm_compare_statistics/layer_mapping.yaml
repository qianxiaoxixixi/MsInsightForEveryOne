###########最新403######################
TopLayer:
  network._backbone.network: module.module #LlamaForCausalLM==GPTModel  #目前主仓LlamaForCausalLM对应GPTModel，后面会把LlamaForCausalLM和TransformerLanguageModel合并成一个cell（GPTModel）对应GPTModel
  network._backbone.network.language_model: module.module #如上，2个对应到1个是允许的，都可以映射上

TransformerLanguageModel: #LlamaForCausalLM:!!! #==GPTModel
  embedding: embedding
  rotary_pos_emb: rotary_pos_emb
  encoder: decoder
  # X: output_layer  #PT的rank4-7才有，主仓没有对应的,私仓同名

Embedding:
  word_embeddings: word_embeddings
  embedding_dropout: embedding_dropout  #MS的rank0-7未发现

# ParallelTransformer:  #encoder
#   input_norm: input_layernorm
#   self_attention: self_attention
#   # X:pre_cross_attn_layernorm不生效
#   # X:cross_attention不生效
#   # X:cross_attn_bda不生效
#   post_attention_norm: pre_mlp_layernorm
#   mlp: mlp
#   final_norm: final_layernorm

ParallelTransformerLayer:
  input_norm: input_layernorm
  self_attention: self_attention
  # X:pre_cross_attn_layernorm不生效
  # X:cross_attention不生效
  # X:cross_attn_bda不生效
  post_attention_norm: pre_mlp_layernorm
  mlp: mlp
  final_norm: final_layernorm

ParallelAttention:
  # q_proj:X   # MS中qkv_concat: True的话建议一直开，因为speed只有这个选项，qkv_proj==qkv_proj，没开的话q_proj + k_proj + v_proj=linear_qkv(pt)
  # k_proj:X   # 同上
  # v_proj: X  # 同上
  # X: q_layernorm 目前无对应，私仓有对应的。pt没开
  # X: k_layernorm 目前无对应，私仓有对应的。pt没开
  flash_attention: core_attention # MS中use_flash_attention: True的话叫flash_attention, 没开的话同名，私仓全部同名
  out_proj: linear_proj

ParallelMLP:
  # gating: X   # gating + mapping = linear_fc1(PT)如：[10,20] = [10,10] + [10,10]
  # mapping: X
  projection: linear_fc2



